name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: J1angJJ
          outputs: readme/resources/grid-snake.svg

      - name: Commit generated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add readme/resources/grid-snake.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update snake animation"
            git push
          fi
